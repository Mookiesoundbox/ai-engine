<!DOCTYPE html>
<html>
<head>
    <title>AI Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            padding: 20px;
            margin: 0;
        }

        #chat {
            max-width: 700px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 10px;
        }

        #topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #messages {
            min-height: 300px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .msg {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            max-width: 90%;
        }

        .user {
            background: #1e3a5f;
        }

        .ai {
            background: #1f4d2e;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        #sendBtn {
            background: #4fc3f7;
            color: #000;
        }

        #logoutBtn {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="chat">
        <div id="topbar">
            <h2>AI Engine</h2>
            <button id="logoutBtn" onclick="logout()">Logout</button>
        </div>

        <div id="messages"></div>

        <div class="row">
            <input id="input" placeholder="Ask something..." />
            <button id="sendBtn" onclick="send()">Send</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById("input");
            const msg = input.value.trim();
            if (!msg) return;

            addMessage("You: " + msg, "user");
            input.value = "";

            const res = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: msg })
            });

            const data = await res.json();

            if (res.status === 401) {
                window.location.reload();
                return;
            }

            addMessage("AI: " + data.reply, "ai");
        }

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;
            document.getElementById("messages").appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function logout() {
            await fetch("/logout", {
                method: "POST"
            });
            window.location.reload();
        }

        document.getElementById("input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                send();
            }
        });
    </script>
</body>
</html>
