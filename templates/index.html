<!DOCTYPE html>
<html>
<head>
    <title>AI Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #fff;
            padding: 20px;
        }
        #chat {
            max-width: 600px;
            margin: auto;
        }
        .msg {
            margin: 10px 0;
        }
        .user {
            color: #4fc3f7;
        }
        .ai {
            color: #81c784;
        }
        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            border: none;
            background: #4fc3f7;
            color: #000;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="chat">
    <h2>AI Engine</h2>

    <div id="messages"></div>

    <input id="input" placeholder="Ask something..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const msg = input.value;
    if (!msg) return;

    addMessage("You: " + msg, "user");

    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    addMessage("AI: " + data.reply, "ai");
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
