<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>My AI Engine</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">AI</div>
        <div class="title-wrap">
          <h1>My AI Engine</h1>
          <p>Private assistant</p>
        </div>
      </div>
      <button class="icon-btn" id="newChatBtn" title="New chat">＋</button>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome-card" id="welcomeCard">
        <h2>How can I help?</h2>
        <p>
          Ask anything. Search, chat, troubleshoot, brainstorm, or build.
        </p>

        <div class="suggestions">
          <button class="suggestion-chip">Summarise my project idea</button>
          <button class="suggestion-chip">Search my indexed docs</button>
          <button class="suggestion-chip">Help me debug my app</button>
          <button class="suggestion-chip">Rewrite this better</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>
    </main>

    <section class="sources-panel hidden" id="sourcesPanel">
      <div class="sources-header">
        <span>Sources</span>
        <button class="icon-btn small" id="closeSourcesBtn">✕</button>
      </div>
      <div id="sourcesList" class="sources-list"></div>
    </section>

    <div class="composer-wrap">
      <form class="composer" id="chatForm">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Message your AI engine..."
          rows="1"
        ></textarea>
        <button type="submit" class="send-btn" id="sendBtn">↑</button>
      </form>
      <div class="composer-note">Your private mobile AI workspace</div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
